function $(id){return document.getElementById(id)}
function toast(msg){const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500)}
function money(n){return '$'+(Number(n)||0).toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtDate(v){if(!v)return ''; if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400*1000)); return d.toISOString().slice(0,10)} if(String(v).includes('T'))return String(v).slice(0,10); return String(v)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function setSync(ok,msg){$('syncDot').className='dot '+(ok?'ok':(ok===false?'bad':'')); $('syncText').textContent=msg}
async function initFirebase(){try{firebase.initializeApp(firebaseConfig); db=firebase.firestore(); online=true; setSync(true,'Firestore conectado'); await bindCollections();}catch(e){console.error(e); online=false; setSync(false,'Modo local'); loadLocal(); renderAll();}}
function loadLocal(){Object.keys(state).forEach(k=>{try{state[k]=JSON.parse(localStorage.getItem('psi_'+k)||'[]')}catch(e){state[k]=[]}}); loaded=true}
function saveLocal(k){localStorage.setItem('psi_'+k,JSON.stringify(state[k]||[]))}
function bindCollections(){return new Promise(resolve=>{let count=0; Object.keys(COL).forEach(k=>{db.collection(COL[k]).onSnapshot(snap=>{state[k]=snap.docs.map(d=>({id:d.id,...d.data()})); count++; if(count>=Object.keys(COL).length && !loaded){loaded=true; renderAll(); resolve()} renderAll();},err=>{console.error(err); online=false; setSync(false,'Error Firestore: '+err.code); loadLocal(); renderAll(); resolve();});}); setTimeout(()=>{if(!loaded){loaded=true; renderAll(); resolve()}},3000);})}
async function saveDoc(k,obj){obj.updatedAt=new Date().toISOString(); if(!obj.id)obj.createdAt=obj.updatedAt; if(online&&db){const col=db.collection(COL[k]); if(obj.id){const id=obj.id; const data={...obj}; delete data.id; await col.doc(id).set(data,{merge:true});}else{await col.add(obj)}}else{if(obj.id){const i=state[k].findIndex(x=>x.id===obj.id); if(i>=0)state[k][i]=obj;}else{obj.id=uid(); state[k].push(obj)} saveLocal(k); renderAll()} }
function genericKeyFields(k,obj){
  obj=obj||{};
  const map={
    proveedores:['ruc','nombre','correo'],
    catalogo:['codigo','descripcion','catalogo'],
    solicitudes:['titulo','detalle','estado'],
    cotizaciones:['titulo','detalle','estado'],
    ingresos:['oc','lote','fechaIngreso'],
    coa:['oc','producto','lote'],
    facturacion:['oc','factura','proveedor'],
    pagos:['oc','factura','fecha']
  };
  return (map[k]||['numero','codigo','ruc','titulo','oc','descripcion']).filter(f=>obj[f]!==undefined && obj[f]!==null && String(obj[f]).trim()!=='');
}
function encodeRec(obj){return encodeURIComponent(JSON.stringify(obj||{}));}
async function delDoc(k,id,key){
  let obj={};
  try{ if(key) obj=JSON.parse(decodeURIComponent(key)); }catch(e){ obj={}; }
  if(!confirm('¿Eliminar este registro?'))return;
  try{
    const idsToDelete=new Set();
    if(id) idsToDelete.add(id);
    // Buscar también en memoria por campos clave, por si el botón vino sin ID.
    const fields=genericKeyFields(k,obj);
    (state[k]||[]).forEach(r=>{
      if(id && r.id===id) idsToDelete.add(r.id);
      const match=fields.length && fields.every(f=>String(r[f]||'')===String(obj[f]||''));
      if(match && r.id) idsToDelete.add(r.id);
    });
    let deletedCount=0;
    if(online&&db){
      const batch=db.batch();
      idsToDelete.forEach(docId=>{batch.delete(db.collection(COL[k]).doc(docId)); deletedCount++;});
      // Si no hay ID, buscar en Firestore por el primer campo clave disponible.
      if(!deletedCount && fields.length){
        const f=fields[0];
        const snap=await db.collection(COL[k]).where(f,'==',obj[f]).get();
        snap.docs.forEach(d=>{
          const data=d.data()||{};
          const match=fields.every(ff=>String(data[ff]||'')===String(obj[ff]||''));
          if(match){batch.delete(d.ref); deletedCount++;}
        });
      }
      if(!deletedCount){toast('No se encontró registro para eliminar'); return;}
      await batch.commit();
    }
    // Quitar de la pantalla/local aunque Firestore tarde en refrescar.
    state[k]=(state[k]||[]).filter(r=>{
      const byId=r.id && idsToDelete.has(r.id);
      const byKey=fields.length && fields.every(f=>String(r[f]||'')===String(obj[f]||''));
      return !(byId||byKey);
    });
    saveLocal(k);
    closeModal();
    renderAll();
    toast('Registro eliminado');
  }catch(e){console.error(e); toast('Error al eliminar: '+(e.code||e.message));}
}
async function deleteOCKey(key){
  try{
    const obj=JSON.parse(decodeURIComponent(key||''));
    await deleteOC(obj.id,obj.numero,obj.fecha,obj.proveedor,obj.total);
  }catch(e){console.error(e); toast('No se pudo leer la OC a eliminar');}
}
async function deleteOC(id,numero,fecha,proveedor,total){
  const label=numero||'esta OC';
  if(!confirm('¿Eliminar la orden de compra '+label+'?'))return;
  try{
    const idsToDelete=new Set();
    // 1) Si viene ID, úsalo directo.
    if(id) idsToDelete.add(id);
    // 2) Buscar en memoria por ID o por número/fecha/proveedor/total.
    state.oc.forEach(o=>{
      const sameId=id && o.id===id;
      const sameNumero=numero && String(o.numero||'')===String(numero||'');
      const sameFecha=!fecha || String(fmtDate(o.fecha)||'')===String(fecha||'') || !o.fecha;
      const sameProv=!proveedor || String(o.proveedor||'')===String(proveedor||'') || !o.proveedor;
      const sameTotal=(total===undefined||total==='') || String(Number(o.total||0))===String(Number(total||0)) || !o.total;
      if(sameId || (sameNumero && sameFecha && sameProv && sameTotal)){
        if(o.id) idsToDelete.add(o.id);
      }
    });
    let deletedCount=0;
    if(online&&db){
      const batch=db.batch();
      // 3) Borrar por IDs encontrados.
      idsToDelete.forEach(docId=>{batch.delete(db.collection(COL.oc).doc(docId)); deletedCount++;});
      // 4) Si no hubo ID confiable, buscar en Firestore por número de OC y borrar coincidencias.
      if(!deletedCount && numero){
        const snap=await db.collection(COL.oc).where('numero','==',String(numero)).get();
        snap.docs.forEach(d=>{
          const data=d.data()||{};
          const sameFecha=!fecha || String(fmtDate(data.fecha)||'')===String(fecha||'') || !data.fecha;
          const sameProv=!proveedor || String(data.proveedor||'')===String(proveedor||'') || !data.proveedor;
          const sameTotal=(total===undefined||total==='') || String(Number(data.total||0))===String(Number(total||0)) || !data.total;
          if(sameFecha && sameProv && sameTotal){batch.delete(d.ref); deletedCount++;}
        });
      }
      if(!deletedCount && numero){
        // Último recurso: borrar todos los documentos con ese número de OC.
        const snap=await db.collection(COL.oc).where('numero','==',String(numero)).get();
        snap.docs.forEach(d=>{batch.delete(d.ref); deletedCount++;});
      }
      if(!deletedCount){toast('No se encontró la OC para eliminar'); return;}
      await batch.commit();
    }
    // 5) Quitar de pantalla inmediatamente, aunque Firestore tarde en devolver snapshot.
    let removedLocal=0;
    state.oc=state.oc.filter(o=>{
      const byId=o.id && idsToDelete.has(o.id);
      const byKey=numero && String(o.numero||'')===String(numero||'') && (!fecha || String(fmtDate(o.fecha)||'')===String(fecha||'') || !o.fecha) && (!proveedor || String(o.proveedor||'')===String(proveedor||'') || !o.proveedor);
      if(byId || byKey){removedLocal++; return false;}
      return true;
    });
    saveLocal('oc');
    closeModal();
    renderAll();
    toast('OC eliminada');
  }catch(e){console.error(e); toast('Error al eliminar: '+(e.code||e.message));}
}

async function deleteOCDuplicates(){
  if(!confirm('¿Eliminar OC duplicadas dejando solo una por número?'))return;
  const seen={}; const del=[];
  state.oc.forEach(o=>{const n=String(o.numero||'').trim(); if(!n)return; if(seen[n])del.push(o); else seen[n]=true;});
  for(const o of del){ if(o.id && online&&db){await db.collection(COL.oc).doc(o.id).delete();} }
  if(!online||!db){state.oc=state.oc.filter(o=>!del.includes(o)); saveLocal('oc'); renderAll();}
  toast('Duplicados eliminados: '+del.length);
}
async function clearOC(){
  if(!confirm('¿Vaciar TODAS las órdenes de compra? Esta acción no se puede deshacer.'))return;
  if(online&&db){
    const snap=await db.collection(COL.oc).get();
    const batch=db.batch();
    snap.docs.forEach(d=>batch.delete(d.ref));
    await batch.commit();
  }else{state.oc=[]; saveLocal('oc'); renderAll();}
  toast('Órdenes de compra eliminadas');
}

function ocKey(o){return encodeURIComponent(JSON.stringify({id:o.id||'',numero:o.numero||'',fecha:fmtDate(o.fecha)||'',proveedor:o.proveedor||'',total:Number(o.total||0)}))}
function ocCard(o){const key=ocKey(o);return `<div class="item"><div class="item-main"><div class="item-title">${esc(o.numero)} · ${esc(o.proveedor)}</div><div class="item-sub">${esc(fmtDate(o.fecha))} · ${esc(o.area||'')} · Total: <b>${money(o.total)}</b></div><div style="margin-top:5px"><span class="badge blue">${esc(o.estado||'Borrador')}</span></div></div><div class="item-actions"><button class="btn blue" onclick="PSI.viewOC('${o.id||''}')">Ver</button><button class="btn ghost" onclick="PSI.openOC('${o.id||''}')">Editar</button><button class="btn green" onclick="PSI.downloadOC('${o.id||''}')">OC</button><button class="btn red" onclick="PSI.deleteOCKey('${key}')">Eliminar</button></div></div>`}
function renderProveedores(){ $('proveedores').innerHTML=`<div class="panel"><div class="ph"><h3>👥 Proveedores</h3><button class="btn" onclick="PSI.openProveedor()">＋ Nuevo proveedor</button></div><div class="pb"><div class="toolbar"><input class="search" id="qProv" placeholder="Buscar proveedor, RUC, contacto..." oninput="PSI.renderProveedores()"></div><div class="cards">${state.proveedores.filter(p=>JSON.stringify(p).toLowerCase().includes(($('qProv')?.value||'').toLowerCase())).map(p=>`<div class="item"><div class="item-main"><div class="item-title">${esc(p.nombre)}</div><div class="item-sub">RUC: ${esc(p.ruc)} · ${esc(p.contacto||'')} · ${esc(p.correo||'')}<br>Pago: ${esc(p.condPago||'')} · Entrega: ${esc(p.tiempoEntrega||'')}</div></div><div class="item-actions"><button class="btn ghost" onclick="PSI.openProveedor('${p.id||''}')">Editar</button><button class="btn red" onclick="PSI.del('proveedores','${p.id||''}', '${encodeRec(p)}')">Eliminar</button></div></div>`).join('')||'<div class="empty">Sin proveedores</div>'}</div></div></div>`}
function renderCatalogo(){ $('catalogo').innerHTML=`<div class="panel"><div class="ph"><h3>📚 Catálogo de productos</h3><button class="btn" onclick="PSI.openProducto()">＋ Nuevo producto</button></div><div class="pb"><div class="cards">${state.catalogo.map(p=>`<div class="item"><div class="item-main"><div class="item-title">${esc(p.descripcion)}</div><div class="item-sub"><code>${esc(p.codigo)}</code> · ${esc(p.categoria)} · ${esc(p.marca||'')} · Cat: ${esc(p.catalogo||'')} · ${money(p.precio)}</div></div><div class="item-actions"><button class="btn ghost" onclick="PSI.openProducto('${p.id||''}')">Editar</button><button class="btn red" onclick="PSI.del('catalogo','${p.id||''}', '${encodeRec(p)}')">Eliminar</button></div></div>`).join('')||'<div class="empty">Sin productos</div>'}</div></div></div>`}
function renderSimple(k){const title={solicitudes:'📝 Solicitudes de compra',cotizaciones:'💰 Cotizaciones'}[k]; const page=$(k); page.innerHTML=`<div class="panel"><div class="ph"><h3>${title}</h3><button class="btn" onclick="PSI.openSimple('${k}')">＋ Nuevo</button></div><div class="pb"><div class="cards">${state[k].map(r=>`<div class="item"><div class="item-main"><div class="item-title">${esc(r.titulo||r.codigo||'Registro')}</div><div class="item-sub">${esc(r.detalle||'')} · Estado: ${esc(r.estado||'Pendiente')}</div></div><div class="item-actions"><button class="btn ghost" onclick="PSI.openSimple('${k}','${r.id||''}')">Editar</button><button class="btn red" onclick="PSI.del('${k}','${r.id||''}', '${encodeRec(r)}')">Eliminar</button></div></div>`).join('')||'<div class="empty">Sin registros</div>'}</div></div></div>`}
function renderOC(){ $('oc').innerHTML=`<div class="panel"><div class="ph"><h3>📄 Órdenes de Compra</h3><div><button class="btn ghost" onclick="PSI.generateIngresoPendientes()">🔁 Preparar ingresos</button> <button class="btn" onclick="PSI.openOC()">＋ Nueva OC</button></div></div><div class="pb"><div class="toolbar"><input class="search" id="qOC" placeholder="Buscar OC, proveedor, producto..." oninput="PSI.renderOC()"><select id="sortOC" class="search" style="max-width:210px" onchange="PSI.renderOC()"><option value="asc">OC ascendente</option><option value="desc">OC descendente</option><option value="fecha">Fecha reciente</option></select></div><div class="cards">${getFilteredOC().map(ocCard).join('')||'<div class="empty">Sin OC registradas</div>'}</div></div></div>`}
function getFilteredOC(){let arr=state.oc.filter(o=>JSON.stringify(o).toLowerCase().includes(($('qOC')?.value||'').toLowerCase())); const sort=$('sortOC')?.value||'asc'; if(sort==='asc')arr.sort((a,b)=>String(a.numero).localeCompare(String(b.numero))); if(sort==='desc')arr.sort((a,b)=>String(b.numero).localeCompare(String(a.numero))); if(sort==='fecha')arr.sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha))); return arr}
function renderIngresos(){const rows=state.ingresos.map(i=>{const o=state.oc.find(x=>x.numero===i.oc)||{};return `<div class="item"><div class="item-main"><div class="item-title">Ingreso ${esc(i.oc)} · ${esc(o.proveedor||i.proveedor||'')}</div><div class="item-sub">Fecha: ${esc(fmtDate(i.fechaIngreso))||'Pendiente'} · Estado: ${esc(i.estado||'Pendiente')} · Recibido por: ${esc(i.responsable||'')}</div></div><div class="item-actions"><button class="btn ghost" onclick="PSI.openIngreso('${i.id||''}')">Completar</button><button class="btn red" onclick="PSI.del('ingresos','${i.id||''}', '${encodeRec(i)}')">Eliminar</button></div></div>`}).join(''); $('ingresos').innerHTML=`<div class="panel"><div class="ph"><h3>📦 Ingresos retroalimentados desde OC</h3><button class="btn" onclick="PSI.generateIngresoPendientes()">🔁 Generar desde OC</button></div><div class="pb"><div class="cards">${rows||'<div class="empty">No hay ingresos. Use Generar desde OC.</div>'}</div></div></div>`}
function renderCOA(){const rows=state.coa.map(c=>`<div class="item"><div class="item-main"><div class="item-title">COA ${esc(c.oc)} · ${esc(c.producto||'')}</div><div class="item-sub">Lote: ${esc(c.lote||'')} · Estado: ${esc(c.estado||'Pendiente')} · Revisor: ${esc(c.revisor||'')}</div></div><div class="item-actions"><button class="btn ghost" onclick="PSI.openCOA('${c.id||''}')">Revisar</button><button class="btn red" onclick="PSI.del('coa','${c.id||''}', '${encodeRec(c)}')">Eliminar</button></div></div>`).join(''); $('coa').innerHTML=`<div class="panel"><div class="ph"><h3>📋 Revisión de COA / Calidad</h3><button class="btn" onclick="PSI.generateCOAPendientes()">🔁 Generar desde ingresos</button></div><div class="pb"><div class="cards">${rows||'<div class="empty">Sin COA pendientes</div>'}</div></div></div>`}
function renderFacturacion(){const rows=state.facturacion.map(f=>`<div class="item"><div class="item-main"><div class="item-title">Factura ${esc(f.factura||'Pendiente')} · OC ${esc(f.oc)}</div><div class="item-sub">Proveedor: ${esc(f.proveedor||'')} · Total: ${money(f.total)} · Estado: ${esc(f.estado||'Pendiente')}</div></div><div class="item-actions"><button class="btn ghost" onclick="PSI.openFactura('${f.id||''}')">Completar</button><button class="btn red" onclick="PSI.del('facturacion','${f.id||''}', '${encodeRec(f)}')">Eliminar</button></div></div>`).join(''); $('facturacion').innerHTML=`<div class="panel"><div class="ph"><h3>🧾 Facturación retroalimentada desde ingresos</h3><button class="btn" onclick="PSI.generateFacturasPendientes()">🔁 Generar desde ingresos</button></div><div class="pb"><div class="cards">${rows||'<div class="empty">Sin facturas pendientes</div>'}</div></div></div>`}
function renderPagos(){const rows=state.pagos.map(p=>`<div class="item"><div class="item-main"><div class="item-title">Pago OC ${esc(p.oc)} · ${esc(p.factura||'')}</div><div class="item-sub">Valor: ${money(p.valor)} · Fecha: ${esc(fmtDate(p.fecha))} · Estado: ${esc(p.estado||'Pendiente')}</div></div><div class="item-actions"><button class="btn ghost" onclick="PSI.openPago('${p.id||''}')">Editar</button><button class="btn red" onclick="PSI.del('pagos','${p.id||''}', '${encodeRec(p)}')">Eliminar</button></div></div>`).join(''); $('pagos').innerHTML=`<div class="panel"><div class="ph"><h3>💳 Pagos</h3><button class="btn" onclick="PSI.openPago()">＋ Nuevo pago</button></div><div class="pb"><div class="cards">${rows||'<div class="empty">Sin pagos</div>'}</div></div></div>`}
function renderConfig(){ $('config').innerHTML=`<div class="panel"><div class="ph"><h3>⚙ Configuración / Importación</h3></div><div class="pb"><p style="color:var(--muted);font-size:13px;line-height:1.5;margin-bottom:12px">Desde aquí puede alimentar el ERP con la base actual del Excel o subir una Orden de Compra en PDF para extraer la información automáticamente.</p><div class="toolbar"><button class="btn" onclick="PSI.loadExcelSeed()">📥 Cargar base Excel 2026 integrada</button><button class="btn blue" onclick="PSI.openImportPDF()">📄 Importar OC desde PDF</button><button class="btn ghost" onclick="PSI.exportJSON()">⬇ Exportar respaldo JSON</button></div><div class="panel" style="margin-top:12px"><div class="ph"><h3>🧹 Limpieza de base</h3></div><div class="pb"><div class="toolbar"><button class="btn warn" onclick="PSI.deleteOCDuplicates()">Eliminar OC duplicadas</button><button class="btn red" onclick="PSI.clearOC()">Vaciar solo OC</button></div><p style="color:var(--muted);font-size:12px;line-height:1.5;margin-top:8px">Si está conectado a Firestore, los cambios se aplican en línea. Use estas opciones con cuidado.</p></div></div><div class="panel" style="margin-top:12px"><div class="ph"><h3>📌 ¿Cómo funciona?</h3></div><div class="pb"><div class="timeline"><div class="tl"><span class="tl-dot ok"></span><span class="tl-text"><b>Base Excel integrada</b>Carga proveedores, catálogo, OC, ingresos y facturación desde el Excel que enviaste.</span></div><div class="tl"><span class="tl-dot warn"></span><span class="tl-text"><b>PDF de OC</b>Lee el texto del PDF y genera una OC editable. Funciona mejor con PDF generado desde Excel/Word, no escaneado.</span></div></div></div></div></div></div>`}
function openProveedor(id=''){const r=state.proveedores.find(x=>x.id===id)||{}; openModal(id?'Editar proveedor':'Nuevo proveedor',`<div class="form-grid"><div class="fg"><label>RUC</label><input id="p-ruc" value="${esc(r.ruc)}"></div><div class="fg"><label>Proveedor</label><input id="p-nombre" value="${esc(r.nombre)}"></div><div class="fg"><label>Contacto</label><input id="p-contacto" value="${esc(r.contacto)}"></div><div class="fg"><label>Correo</label><input id="p-correo" value="${esc(r.correo)}"></div><div class="fg"><label>Condición pago</label><input id="p-pago" value="${esc(r.condPago)}"></div><div class="fg"><label>Tiempo entrega</label><input id="p-entrega" value="${esc(r.tiempoEntrega)}"></div></div>`,`<button class="btn" onclick="PSI.saveProveedor('${id}')">Guardar</button><button class="btn ghost" onclick="PSI.close()">Cancelar</button>`,true)}
async function saveProveedor(id){await saveDoc('proveedores',{id,ruc:formVal('p-ruc'),nombre:formVal('p-nombre'),contacto:formVal('p-contacto'),correo:formVal('p-correo'),condPago:formVal('p-pago'),tiempoEntrega:formVal('p-entrega'),estado:'Activo'}); closeModal(); toast('Proveedor guardado')}
function openProducto(id=''){const r=state.catalogo.find(x=>x.id===id)||{}; openModal(id?'Editar producto':'Nuevo producto',`<div class="form-grid"><div class="fg"><label>Código</label><input id="c-codigo" value="${esc(r.codigo)}"></div><div class="fg"><label>Categoría</label><select id="c-cat">${opt(['Reactivos','Insumos','Estándar / MRC','Equipos','Calibración','Mantenimiento','Servicio','Microbiología'],r.categoria)}</select></div><div class="fg full"><label>Descripción</label><input id="c-desc" value="${esc(r.descripcion)}"></div><div class="fg"><label>Unidad</label><select id="c-unidad">${opt(['Unidad','Caja','Frasco','Galón','mL','L','g','kg','Servicio'],r.unidad)}</select></div><div class="fg"><label>Marca / Nombre</label><input id="c-marca" value="${esc(r.marca)}"></div><div class="fg"><label>N° Catálogo</label><input id="c-catalogo" value="${esc(r.catalogo)}"></div><div class="fg"><label>Precio histórico</label><input type="number" id="c-precio" value="${esc(r.precio||0)}"></div></div>`,`<button class="btn" onclick="PSI.saveProducto('${id}')">Guardar</button><button class="btn ghost" onclick="PSI.close()">Cancelar</button>`,true)}
async function saveProducto(id){await saveDoc('catalogo',{id,codigo:formVal('c-codigo'),categoria:formVal('c-cat'),descripcion:formVal('c-desc'),unidad:formVal('c-unidad'),marca:formVal('c-marca'),catalogo:formVal('c-catalogo'),precio:Number(formVal('c-precio')||0)}); closeModal(); toast('Producto guardado')}
function ocLine(it={},idx=0){return `<div class="oc-line" data-line="${idx}"><select class="it-tipo">${opt(['Reactivos','Insumos','Estándar / MRC','Equipos','Calibración','Mantenimiento','Servicio','Microbiología'],it.tipo||'Reactivos')}</select><input class="it-desc" placeholder="Descripción" value="${esc(it.descripcion)}" list="prodList"><input class="it-cant" type="number" placeholder="Cant." value="${esc(it.cantidad||1)}" oninput="PSI.calcOCForm()"><select class="it-unid">${opt(['Unidad','Caja','Frasco','Galón','mL','L','g','kg','Servicio'],it.unidad||'Unidad')}</select><input class="it-nombre" placeholder="Marca/Nombre" value="${esc(it.nombre)}"><input class="it-cat" placeholder="N° Catálogo" value="${esc(it.catalogo)}"><button class="btn red" type="button" onclick="this.closest('.oc-line').remove();PSI.calcOCForm()">×</button><input class="it-vu" type="number" placeholder="V. Unit." value="${esc(it.vu||0)}" oninput="PSI.calcOCForm()" style="grid-column:6/8"></div>`}
function openOC(id=''){const r=state.oc.find(x=>x.id===id)||{numero:nextOC(),fecha:new Date().toISOString().slice(0,10),items:[{}],estado:'Borrador',requisitos:'ISO 17025 / ISO 17034 / Certificado de análisis o trazabilidad NIST.',docs:'COA, Certificados de calibración, Factura, Guía de remisión.',entrega:'En laboratorio o dirección indicada.',garantia:'Aplicable si corresponde.'}; const provs=state.proveedores.map(p=>p.nombre); const prodOptions=state.catalogo.map(p=>`<option value="${esc(p.descripcion)}"></option>`).join(''); openModal(id?'Editar Orden de Compra':'Nueva Orden de Compra',`<datalist id="prodList">${prodOptions}</datalist><div class="form-grid"><div class="fg"><label>N° Orden</label><input id="o-num" value="${esc(r.numero)}"></div><div class="fg"><label>Fecha</label><input type="date" id="o-fecha" value="${esc(fmtDate(r.fecha))}"></div><div class="fg"><label>Área solicitante</label><input id="o-area" value="${esc(r.area||'Laboratorio de aguas y suelos')}"></div><div class="fg"><label>Proveedor</label><select id="o-prov" onchange="PSI.fillProv()"><option></option>${opt(provs,r.proveedor)}</select></div><div class="fg"><label>RUC</label><input id="o-ruc" value="${esc(r.ruc)}"></div><div class="fg"><label>Contacto</label><input id="o-contacto" value="${esc(r.contacto)}"></div><div class="fg"><label>Correo</label><input id="o-correo" value="${esc(r.correo)}"></div><div class="fg"><label>Condición pago</label><input id="o-pago" value="${esc(r.condPago)}"></div><div class="fg"><label>Cotización ref.</label><input id="o-cot" value="${esc(r.cotizacion)}"></div><div class="fg"><label>Tiempo entrega</label><input id="o-entrega" value="${esc(r.tiempoEntrega)}"></div><div class="fg"><label>Solicitado por</label><input id="o-sol" value="${esc(r.solicitadoPor||'Jipson Franco')}"></div><div class="fg"><label>Estado</label><select id="o-estado">${opt(['Borrador','Emitida','Enviada','Parcial','Completa','Anulada'],r.estado)}</select></div></div><div style="margin:12px 0 6px;color:var(--accent);font-weight:900;font-size:12px">ITEMS</div><div id="ocLines">${(r.items&&r.items.length?r.items:[{}]).map(ocLine).join('')}</div><button class="btn ghost" type="button" onclick="PSI.addOCLine()">＋ Agregar item</button><div class="form-grid" style="margin-top:12px"><div class="fg"><label>Subtotal</label><input id="o-sub" disabled></div><div class="fg"><label>IVA 15%</label><input id="o-iva" disabled></div><div class="fg"><label>Total</label><input id="o-total" disabled></div><div class="fg"><label>Aprobado por</label><input id="o-aprob" value="${esc(r.aprobadoPor||'Ing. Jipson Franco')}"></div><div class="fg"><label>Autorizado por</label><input id="o-aut" value="${esc(r.autorizadoPor||'Ing. Francisco Torres')}"></div><div class="fg full"><label>Requisitos técnicos</label><input id="o-req" value="${esc(r.requisitos)}"></div><div class="fg full"><label>Documentación solicitada</label><input id="o-docs" value="${esc(r.docs)}"></div></div>`,`<button class="btn" onclick="PSI.saveOC('${id}')">Guardar OC</button><button class="btn green" onclick="PSI.saveAndDownloadOC('${id}')">Guardar y descargar</button><button class="btn ghost" onclick="PSI.close()">Cancelar</button>`); setTimeout(calcOCForm,50)}
function addOCLine(){const c=$('ocLines'); c.insertAdjacentHTML('beforeend',ocLine({},c.children.length)); calcOCForm()}
function fillProv(){const p=state.proveedores.find(x=>x.nombre===formVal('o-prov')); if(p){$('o-ruc').value=p.ruc||'';$('o-contacto').value=p.contacto||'';$('o-correo').value=p.correo||'';$('o-pago').value=p.condPago||'';$('o-entrega').value=p.tiempoEntrega||'';}}
function readOCForm(id=''){const items=[...document.querySelectorAll('#ocLines .oc-line')].map(l=>({tipo:l.querySelector('.it-tipo').value,descripcion:l.querySelector('.it-desc').value,cantidad:Number(l.querySelector('.it-cant').value||0),unidad:l.querySelector('.it-unid').value,nombre:l.querySelector('.it-nombre').value,catalogo:l.querySelector('.it-cat').value,vu:Number(l.querySelector('.it-vu').value||0)})).filter(x=>x.descripcion); return calcOC({id,numero:formVal('o-num'),fecha:formVal('o-fecha'),area:formVal('o-area'),proveedor:formVal('o-prov'),ruc:formVal('o-ruc'),contacto:formVal('o-contacto'),correo:formVal('o-correo'),condPago:formVal('o-pago'),cotizacion:formVal('o-cot'),tiempoEntrega:formVal('o-entrega'),solicitadoPor:formVal('o-sol'),estado:formVal('o-estado'),aprobadoPor:formVal('o-aprob'),autorizadoPor:formVal('o-aut'),requisitos:formVal('o-req'),docs:formVal('o-docs'),entrega:'En laboratorio o dirección indicada.',garantia:'Aplicable si corresponde.',items})}
function calcOCForm(){const o=readOCForm(''); $('o-sub').value=money(o.subtotal); $('o-iva').value=money(o.iva); $('o-total').value=money(o.total)}

function sameKey(k,a,b){
  if(!a||!b)return false;
  if(k==='proveedores')return (a.ruc&&b.ruc&&a.ruc===b.ruc)||(String(a.nombre||'').toLowerCase()===String(b.nombre||'').toLowerCase());
  if(k==='catalogo')return String(a.descripcion||'').toLowerCase()===String(b.descripcion||'').toLowerCase();
  if(k==='oc')return String(a.numero||'')===String(b.numero||'');
  if(k==='ingresos')return String(a.oc||'')===String(b.oc||'') && JSON.stringify(a.items||[]).slice(0,120)===JSON.stringify(b.items||[]).slice(0,120);
  if(k==='facturacion')return String(a.oc||'')===String(b.oc||'') && String(a.producto||'').toLowerCase()===String(b.producto||'').toLowerCase() && String(a.fechaFactura||'')===String(b.fechaFactura||'');
  return false;
}
async function loadExcelSeed(){
  if(!confirm('Se cargará la base integrada desde el Excel 2026. No duplica OC existentes por número. ¿Continuar?'))return;
  const order=['proveedores','catalogo','oc','ingresos','facturacion'];
  let added=0, skipped=0;
  for(const k of order){
    const arr=EXCEL_SEED[k]||[];
    for(const raw of arr){
      const obj={...raw};
      if((state[k]||[]).some(x=>sameKey(k,x,obj))){skipped++; continue;}
      await saveDoc(k,obj); added++;
    }
  }
  toast('Base Excel cargada: '+added+' nuevos, '+skipped+' omitidos');
}

function normalizeText(t){return String(t||'').replace(/\s+/g,' ').replace(/\u00a0/g,' ').trim()}
function parseMoney(v){v=String(v||'').replace(/\$/g,'').trim(); if(!v)return 0; if(v.includes(',')&&v.includes('.'))v=v.replace(/\./g,'').replace(',', '.'); else v=v.replace(',', '.'); return Number(v.replace(/[^0-9.\-]/g,''))||0}
function parseDateText(v){v=String(v||'').trim(); let m=v.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/); if(m){return `${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;} return v}
function pickBetween(txt,label,nextLabels){
  const t=normalizeText(txt); const upper=t.toUpperCase(); const pos=upper.indexOf(label.toUpperCase()); if(pos<0)return '';
  let start=pos+label.length, end=t.length;
  for(const n of nextLabels){const p=upper.indexOf(n.toUpperCase(), start); if(p>=0 && p<end)end=p;}
  return t.slice(start,end).replace(/^[:\s]+/,'').trim();
}
function extractOCFromText(text){
  const t=normalizeText(text);
  const numero=pickBetween(t,'N° ORDEN',['FECHA','ÁREA SOLICITANTE','PROVEEDOR']).replace(':','').trim();
  const fecha=parseDateText(pickBetween(t,'FECHA',['ÁREA SOLICITANTE','PROVEEDOR']).replace(':',''));
  const area=pickBetween(t,'ÁREA SOLICITANTE',['PROVEEDOR','COND. PAGO']);
  const proveedor=pickBetween(t,'PROVEEDOR',['COND. PAGO','RUC']);
  const condPago=pickBetween(t,'COND. PAGO',['RUC','COTIZACIÓN REF']);
  const ruc=pickBetween(t,'RUC',['COTIZACIÓN REF','CONTACTO']);
  const cotizacion=pickBetween(t,'COTIZACIÓN REF.',['CONTACTO','TIEMPO ENTREGA']);
  const contacto=pickBetween(t,'CONTACTO',['TIEMPO ENTREGA','CORREO']);
  const tiempoEntrega=pickBetween(t,'TIEMPO ENTREGA',['CORREO','SOLCITADO','SOLICITADO','ITEMS']);
  const correo=pickBetween(t,'CORREO',['SOLCITADO','SOLICITADO','ITEMS']);
  let solicitadoPor=pickBetween(t,'SOLCITADO POR',['ITEMS','TIPO SERVICIO']);
  if(!solicitadoPor)solicitadoPor=pickBetween(t,'SOLICITADO POR',['ITEMS','TIPO SERVICIO']);
  let subtotal=0, iva=0, total=0;
  let m=t.match(/SUBTOTAL\s*\$?\s*([0-9.,]+)/i); if(m)subtotal=parseMoney(m[1]);
  m=t.match(/IVA\s*15%?\s*\$?\s*([0-9.,]+)/i); if(m)iva=parseMoney(m[1]);
  m=t.match(/TOTAL\s*\$?\s*([0-9.,]+)/i); if(m)total=parseMoney(m[1]);
  const itemRegex=/(\d+)\s+(Reactivos|Insumos|Estandar|Estándar|Equipos|Servicio|Mantenimiento|Calibración|Microbiología)\s+(.+?)\s+(\d+(?:[.,]\d+)?)\s+(Unidad|unidad|Caja|Frasco|mL|ml|L|g|kg|Servicio)\s+(.+?)\s+([A-Za-z0-9\-\/\.]+)\s+\$?\s*([0-9.,]+)\s+\$?\s*([0-9.,]+)/gi;
  const items=[]; let im;
  while((im=itemRegex.exec(t))){items.push({tipo:im[2],descripcion:im[3].trim(),cantidad:parseMoney(im[4])||1,unidad:im[5],nombre:im[6].trim(),catalogo:im[7].trim(),vu:parseMoney(im[8])});}
  if(!items.length){
    let desc=pickBetween(t,'DESCRIPCIÓN DEL PRODUCTO / SERVICIO',['SUBTOTAL','APROBADO POR']);
    desc=desc.replace(/CANT\.\s*UNID\..*/i,'').trim();
    if(desc.length>120)desc=desc.slice(0,120);
    items.push({tipo:'Reactivos',descripcion:desc||'Producto importado desde PDF',cantidad:1,unidad:'Unidad',nombre:'',catalogo:'',vu:subtotal||0});
  }
  const o=calcOC({numero:numero||nextOC(),fecha:fecha||new Date().toISOString().slice(0,10),area:area||'Laboratorio de aguas y suelos',proveedor:proveedor||'',ruc:ruc||'',contacto:contacto||'',correo:correo||'',condPago:condPago||'',cotizacion:cotizacion||'',tiempoEntrega:tiempoEntrega||'',solicitadoPor:solicitadoPor||'Jipson Franco',aprobadoPor:'Ing. Jipson Franco',autorizadoPor:'Ing. Francisco Torres',estado:'Importada PDF',items,requisitos:'ISO 17025 / ISO 17034 / Certificado de análisis o trazabilidad NIST.',docs:'COA, Certificados de calibración, Factura, Guía de remisión.',entrega:'En laboratorio o dirección indicada.',garantia:'Aplicable si corresponde.'});
  if(subtotal)o.subtotal=subtotal; if(iva)o.iva=iva; if(total)o.total=total;
  return o;
}
async function processOCPDF(){
  const file=$('pdf-oc-file')?.files?.[0]; if(!file){toast('Seleccione un PDF'); return;}
  try{
    if(!window.pdfjsLib){toast('No se pudo cargar lector PDF'); return;}
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const buf=await file.arrayBuffer(); const pdf=await pdfjsLib.getDocument({data:new Uint8Array(buf)}).promise;
    let text='';
    for(let p=1;p<=pdf.numPages;p++){const page=await pdf.getPage(p); const tc=await page.getTextContent(); text += '\n'+tc.items.map(i=>i.str).join(' ');}
    const oc=extractOCFromText(text);
    $('pdf-preview').value='OC detectada: '+oc.numero+'\nProveedor: '+oc.proveedor+'\nFecha: '+oc.fecha+'\nItems: '+(oc.items||[]).length+'\nTotal: '+money(oc.total)+'\n\nTexto leído (primeros 1500 caracteres):\n'+text.slice(0,1500);
    if(confirm('Se detectó la OC '+oc.numero+' de '+(oc.proveedor||'proveedor no identificado')+'. ¿Desea guardarla en el ERP?')){
      if(state.oc.some(x=>String(x.numero)===String(oc.numero)) && !confirm('Ya existe una OC con ese número. ¿Guardar de todos modos?'))return;
      await saveDoc('oc',oc); closeModal(); nav('oc'); toast('OC importada desde PDF');
    }
  }catch(e){console.error(e); toast('No se pudo leer el PDF'); if($('pdf-preview'))$('pdf-preview').value='Error: '+(e.message||e);}
}
