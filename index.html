<title>PSI ERP-LIMS Unificado · Firestore</title>
<style>
:root{--bg:#0d1820;--surface:#122030;--card:#172840;--border:#1e3550;--accent:#00c2a0;--text:#e8edf2;--muted:#7ea0b8;--blue:#3b9dff;--green:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:42px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:6px 10px;flex-shrink:0;overflow-x:auto}
.brand{font-size:13px;font-weight:900;color:var(--accent);display:flex;align-items:center;gap:7px;white-space:nowrap;margin-right:8px}
.brand small{font-size:10px;color:var(--muted);font-weight:700}
.tabs{display:flex;gap:5px;margin-left:auto}
.tab{border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:900;padding:8px 13px;border-radius:10px;cursor:pointer;white-space:nowrap}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#05251e}
.wrap{flex:1;position:relative;min-height:0}
.frame{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--bg);display:none}
.frame.active{display:block}
.badge{font-size:10px;color:var(--green);border:1px solid rgba(34,197,94,.35);background:rgba(34,197,94,.1);border-radius:20px;padding:3px 8px;white-space:nowrap}
@media(max-width:700px){.brand small,.badge{display:none}.tab{font-size:11px;padding:7px 9px}}
</style>
</head>

function decodeB64Utf8(b64){
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}
let loaded={compras:false,mrc:false};
function loadApp(app){
  if(loaded[app]) return;
  const frame = document.getElementById('frame-'+app);
  frame.srcdoc = decodeB64Utf8(app==='compras'?APP_COMPRAS_B64:APP_MRC_B64);
  loaded[app]=true;
}
function showApp(app){
  loadApp(app);
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.app===app));
  document.querySelectorAll('.frame').forEach(f=>f.classList.remove('active'));
  document.getElementById('frame-'+app).classList.add('active');
}
loadApp('compras');
</script>
