function $(id){return document.getElementById(id)}
function toast(msg){const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500)}
function money(n){return '$'+(Number(n)||0).toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtDate(v){if(!v)return ''; if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400*1000)); return d.toISOString().slice(0,10)} if(String(v).includes('T'))return String(v).slice(0,10); return String(v)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function setSync(ok,msg){$('syncDot').className='dot '+(ok?'ok':(ok===false?'bad':'')); $('syncText').textContent=msg}
async function initFirebase(){try{firebase.initializeApp(firebaseConfig); db=firebase.firestore(); online=true; setSync(true,'Firestore conectado'); await bindCollections();}catch(e){console.error(e); online=false; setSync(false,'Modo local'); loadLocal(); renderAll();}}
function loadLocal(){Object.keys(state).forEach(k=>{try{state[k]=JSON.parse(localStorage.getItem('psi_'+k)||'[]')}catch(e){state[k]=[]}}); loaded=true}
function saveLocal(k){localStorage.setItem('psi_'+k,JSON.stringify(state[k]||[]))}
function bindCollections(){return new Promise(resolve=>{let count=0; Object.keys(COL).forEach(k=>{db.collection(COL[k]).onSnapshot(snap=>{state[k]=snap.docs.map(d=>({id:d.id,...d.data()})); count++; if(count>=Object.keys(COL).length &amp;&amp; !loaded){loaded=true; renderAll(); resolve()} renderAll();},err=>{console.error(err); online=false; setSync(false,'Error Firestore: '+err.code); loadLocal(); renderAll(); resolve();});}); setTimeout(()=>{if(!loaded){loaded=true; renderAll(); resolve()}},3000);})}
async function saveDoc(k,obj){obj.updatedAt=new Date().toISOString(); if(!obj.id)obj.createdAt=obj.updatedAt; if(online&amp;&amp;db){const col=db.collection(COL[k]); if(obj.id){const id=obj.id; const data={...obj}; delete data.id; await col.doc(id).set(data,{merge:true});}else{await col.add(obj)}}else{if(obj.id){const i=state[k].findIndex(x=>x.id===obj.id); if(i>=0)state[k][i]=obj;}else{obj.id=uid(); state[k].push(obj)} saveLocal(k); renderAll()} }
function genericKeyFields(k,obj){
  obj=obj||{};
  const map={
    proveedores:['ruc','nombre','correo'],
    catalogo:['codigo','descripcion','catalogo'],
    solicitudes:['titulo','detalle','estado'],
    cotizaciones:['titulo','detalle','estado'],
    ingresos:['oc','lote','fechaIngreso'],
    coa:['oc','producto','lote'],
    facturacion:['oc','factura','proveedor'],
    pagos:['oc','factura','fecha']
  };
  return (map[k]||['numero','codigo','ruc','titulo','oc','descripcion']).filter(f=>obj[f]!==undefined &amp;&amp; obj[f]!==null &amp;&amp; String(obj[f]).trim()!=='');
}
function encodeRec(obj){return encodeURIComponent(JSON.stringify(obj||{}));}
async function delDoc(k,id,key){
  let obj={};
  try{ if(key) obj=JSON.parse(decodeURIComponent(key)); }catch(e){ obj={}; }
  if(!confirm('¿Eliminar este registro?'))return;
  try{
    const idsToDelete=new Set();
    if(id) idsToDelete.add(id);
    // Buscar también en memoria por campos clave, por si el botón vino sin ID.
    const fields=genericKeyFields(k,obj);
    (state[k]||[]).forEach(r=>{
      if(id &amp;&amp; r.id===id) idsToDelete.add(r.id);
      const match=fields.length &amp;&amp; fields.every(f=>String(r[f]||'')===String(obj[f]||''));
      if(match &amp;&amp; r.id) idsToDelete.add(r.id);
    });
    let deletedCount=0;
    if(online&amp;&amp;db){
      const batch=db.batch();
      idsToDelete.forEach(docId=>{batch.delete(db.collection(COL[k]).doc(docId)); deletedCount++;});
      // Si no hay ID, buscar en Firestore por el primer campo clave disponible.
      if(!deletedCount &amp;&amp; fields.length){
        const f=fields[0];
        const snap=await db.collection(COL[k]).where(f,'==',obj[f]).get();
        snap.docs.forEach(d=>{
          const data=d.data()||{};
          const match=fields.every(ff=>String(data[ff]||'')===String(obj[ff]||''));
          if(match){batch.delete(d.ref); deletedCount++;}
        });
      }
      if(!deletedCount){toast('No se encontró registro para eliminar'); return;}
      await batch.commit();
    }
    // Quitar de la pantalla/local aunque Firestore tarde en refrescar.
    state[k]=(state[k]||[]).filter(r=>{
      const byId=r.id &amp;&amp; idsToDelete.has(r.id);
      const byKey=fields.length &amp;&amp; fields.every(f=>String(r[f]||'')===String(obj[f]||''));
      return !(byId||byKey);
    });
    saveLocal(k);
    closeModal();
    renderAll();
    toast('Registro eliminado');
  }catch(e){console.error(e); toast('Error al eliminar: '+(e.code||e.message));}
}
async function deleteOCKey(key){
  try{
    const obj=JSON.parse(decodeURIComponent(key||''));
    await deleteOC(obj.id,obj.numero,obj.fecha,obj.proveedor,obj.total);
  }catch(e){console.error(e); toast('No se pudo leer la OC a eliminar');}
}
async function deleteOC(id,numero,fecha,proveedor,total){
  const label=numero||'esta OC';
  if(!confirm('¿Eliminar la orden de compra '+label+'?'))return;
  try{
    const idsToDelete=new Set();
    // 1) Si viene ID, úsalo directo.
    if(id) idsToDelete.add(id);
    // 2) Buscar en memoria por ID o por número/fecha/proveedor/total.
    state.oc.forEach(o=>{
      const sameId=id &amp;&amp; o.id===id;
      const sameNumero=numero &amp;&amp; String(o.numero||'')===String(numero||'');
      const sameFecha=!fecha || String(fmtDate(o.fecha)||'')===String(fecha||'') || !o.fecha;
      const sameProv=!proveedor || String(o.proveedor||'')===String(proveedor||'') || !o.proveedor;
      const sameTotal=(total===undefined||total==='') || String(Number(o.total||0))===String(Number(total||0)) || !o.total;
      if(sameId || (sameNumero &amp;&amp; sameFecha &amp;&amp; sameProv &amp;&amp; sameTotal)){
        if(o.id) idsToDelete.add(o.id);
      }
    });
    let deletedCount=0;
    if(online&amp;&amp;db){
      const batch=db.batch();
      // 3) Borrar por IDs encontrados.
      idsToDelete.forEach(docId=>{batch.delete(db.collection(COL.oc).doc(docId)); deletedCount++;});
      // 4) Si no hubo ID confiable, buscar en Firestore por número de OC y borrar coincidencias.
      if(!deletedCount &amp;&amp; numero){
        const snap=await db.collection(COL.oc).where('numero','==',String(numero)).get();
        snap.docs.forEach(d=>{
          const data=d.data()||{};
          const sameFecha=!fecha || String(fmtDate(data.fecha)||'')===String(fecha||'') || !data.fecha;
          const sameProv=!proveedor || String(data.proveedor||'')===String(proveedor||'') || !data.proveedor;
          const sameTotal=(total===undefined||total==='') || String(Number(data.total||0))===String(Number(total||0)) || !data.total;
          if(sameFecha &amp;&amp; sameProv &amp;&amp; sameTotal){batch.delete(d.ref); deletedCount++;}
        });
      }
      if(!deletedCount &amp;&amp; numero){
        // Último recurso: borrar todos los documentos con ese número de OC.
        const snap=await db.collection(COL.oc).where('numero','==',String(numero)).get();
        snap.docs.forEach(d=>{batch.delete(d.ref); deletedCount++;});
      }
      if(!deletedCount){toast('No se encontró la OC para eliminar'); return;}
      await batch.commit();
    }
    // 5) Quitar de pantalla inmediatamente, aunque Firestore tarde en devolver snapshot.
    let removedLocal=0;
    state.oc=state.oc.filter(o=>{
      const byId=o.id &amp;&amp; idsToDelete.has(o.id);
      const byKey=numero &amp;&amp; String(o.numero||'')===String(numero||'') &amp;&amp; (!fecha || String(fmtDate(o.fecha)||'')===String(fecha||'') || !o.fecha) &amp;&amp; (!proveedor || String(o.proveedor||'')===String(proveedor||'') || !o.proveedor);
      if(byId || byKey){removedLocal++; return false;}
      return true;
    });
    saveLocal('oc');
    closeModal();
    renderAll();
    toast('OC eliminada');
  }catch(e){console.error(e); toast('Error al eliminar: '+(e.code||e.message));}
}

async function deleteOCDuplicates(){
  if(!confirm('¿Eliminar OC duplicadas dejando solo una por número?'))return;
  const seen={}; const del=[];
  state.oc.forEach(o=>{const n=String(o.numero||'').trim(); if(!n)return; if(seen[n])del.push(o); else seen[n]=true;});
  for(const o of del){ if(o.id &amp;&amp; online&amp;&amp;db){await db.collection(COL.oc).doc(o.id).delete();} }
  if(!online||!db){state.oc=state.oc.filter(o=>!del.includes(o)); saveLocal('oc'); renderAll();}
  toast('Duplicados eliminados: '+del.length);
}
async function clearOC(){
  if(!confirm('¿Vaciar TODAS las órdenes de compra? Esta acción no se puede deshacer.'))return;
  if(online&amp;&amp;db){
    const snap=await db.collection(COL.oc).get();
    const batch=db.batch();
    snap.docs.forEach(d=>batch.delete(d.ref));
    await batch.commit();
  }else{state.oc=[]; saveLocal('oc'); renderAll();}
  toast('Órdenes de compra eliminadas');
}

function opt(arr,val){return arr.map(x=>`<option ${x==val?'selected':''}>${esc(x)}</option>`).join('')}

function calcOC(o){o.items=o.items||[]; o.subtotal=o.items.reduce((a,it)=>a+(Number(it.cantidad)||0)*(Number(it.vu)||0),0); o.iva=+(o.subtotal*.15).toFixed(2); o.total=+(o.subtotal+o.iva).toFixed(2); return o}
function nextOC(){const nums=state.oc.map(o=>String(o.numero||'')).filter(Boolean).map(n=>Number(n.split('-')[1]||0)).filter(Boolean); const max=nums.length?Math.max(...nums):98; return '26-'+String(max+1).padStart(4,'0')}

uot;${esc(r.tiempoEntrega)}&quot;></div><div class=&quot;fg&quot;><label>Solicitado por</label><input id=&quot;o-sol&quot; value=&quot;${esc(r.solicitadoPor||'Jipson Franco')}&quot;></div><div class=&quot;fg&quot;><label>Estado</label><select id=&quot;o-estado&quot;>${opt(['Borrador','Emitida','Enviada','Parcial','Completa','Anulada'],r.estado)}</select></div></div><div style=&quot;margin:12px 0 6px;color:var(--accent);font-weight:900;font-size:12px&quot;>ITEMS</div><div id=&quot;ocLines&quot;>${(r.items&amp;&amp;r.items.length?r.items:[{}]).map(ocLine).join('')}</div><button class=&quot;btn ghost&quot; type=&quot;button&quot; onclick=&quot;PSI.addOCLine()&quot;>＋ Agregar item</button><div class=&quot;form-grid&quot; style=&quot;margin-top:12px&quot;><div class=&quot;fg&quot;><label>Subtotal</label><input id=&quot;o-sub&quot; disabled></div><div class=&quot;fg&quot;><label>IVA 15%</label><input id=&quot;o-iva&quot; disabled></div><div class=&quot;fg&quot;><label>Total</label><input id=&quot;o-total&quot; disabled></div><div class=&quot;fg&quot;><label>Aprobado por</label><input id=&quot;o-aprob&quot; value=&quot;${esc(r.aprobadoPor||'Ing. Jipson Franco')}&quot;></div><div class=&quot;fg&quot;><label>Autorizado por</label><input id=&quot;o-aut&quot; value=&quot;${esc(r.autorizadoPor||'Ing. Francisco Torres')}&quot;></div><div class=&quot;fg full&quot;><label>Requisitos técnicos</label><input id=&quot;o-req&quot; value=&quot;${esc(r.requisitos)}&quot;></div><div class=&quot;fg full&quot;><label>Documentación solicitada</label><input id=&quot;o-docs&quot; value=&quot;${esc(r.docs)}&quot;></div></div>`,`<button class=&quot;btn&quot; onclick=&quot;PSI.saveOC('${id}')&quot;>Guardar OC</button><button class=&quot;btn green&quot; onclick=&quot;PSI.saveAndDownloadOC('${id}')&quot;>Guardar y descargar</button><button class=&quot;btn ghost&quot; onclick=&quot;PSI.close()&quot;>Cancelar</button>`); setTimeout(calcOCForm,50)}
function addOCLine(){const c=$('ocLines'); c.insertAdjacentHTML('beforeend',ocLine({},c.children.length)); calcOCForm()}
function fillProv(){const p=state.proveedores.find(x=>x.nombre===formVal('o-prov')); if(p){$('o-ruc').value=p.ruc||'';$('o-contacto').value=p.contacto||'';$('o-correo').value=p.correo||'';$('o-pago').value=p.condPago||'';$('o-entrega').value=p.tiempoEntrega||'';}}
function readOCForm(id=''){const items=[...document.querySelectorAll('#ocLines .oc-line')].map(l=>({tipo:l.querySelector('.it-tipo').value,descripcion:l.querySelector('.it-desc').value,cantidad:Number(l.querySelector('.it-cant').value||0),unidad:l.querySelector('.it-unid').value,nombre:l.querySelector('.it-nombre').value,catalogo:l.querySelector('.it-cat').value,vu:Number(l.querySelector('.it-vu').value||0)})).filter(x=>x.descripcion); return calcOC({id,numero:formVal('o-num'),fecha:formVal('o-fecha'),area:formVal('o-area'),proveedor:formVal('o-prov'),ruc:formVal('o-ruc'),contacto:formVal('o-contacto'),correo:formVal('o-correo'),condPago:formVal('o-pago'),cotizacion:formVal('o-cot'),tiempoEntrega:formVal('o-entrega'),solicitadoPor:formVal('o-sol'),estado:formVal('o-estado'),aprobadoPor:formVal('o-aprob'),autorizadoPor:formVal('o-aut'),requisitos:formVal('o-req'),docs:formVal('o-docs'),entrega:'En laboratorio o dirección indicada.',garantia:'Aplicable si corresponde.',items})}
function calcOCForm(){const o=readOCForm(''); $('o-sub').value=money(o.subtotal); $('o-iva').value=money(o.iva); $('o-total').value=money(o.total)}
async function saveOC(id=''){const o=readOCForm(id); if(!o.numero||!o.proveedor||!o.items.length){toast('Complete OC, proveedor e items'); return} await saveDoc('oc',o); closeModal(); toast('OC guardada')}
async function saveAndDownloadOC(id=''){const o=readOCForm(id); await saveDoc('oc',o); closeModal(); setTimeout(()=>downloadOCByObject(o),300); toast('OC guardada')}

&quot;tl-text&quot;><b>Factura</b>${state.facturacion.some(f=>f.oc===o.numero)?'Generada':'Pendiente'}</span></div></div></div></div></div></div>`,`<button class=&quot;btn green&quot; onclick=&quot;PSI.downloadOC('${id}')&quot;>Descargar OC</button><button class=&quot;btn ghost&quot; onclick=&quot;PSI.openOC('${id}')&quot;>Editar</button><button class=&quot;btn red&quot; onclick=&quot;PSI.deleteOCKey('${ocKey(o)}')&quot;>Eliminar</button><button class=&quot;btn ghost&quot; onclick=&quot;PSI.close()&quot;>Cerrar</button>`)}

async function loadSeed(){for(const k of Object.keys(seed)){for(const obj of seed[k]){if(!state[k].some(x=>(x.numero&amp;&amp;x.numero===obj.numero)||(x.ruc&amp;&amp;x.ruc===obj.ruc)||(x.codigo&amp;&amp;x.codigo===obj.codigo))){await saveDoc(k,{...obj})}}} toast('Base inicial cargada')}

function sameKey(k,a,b){
  if(!a||!b)return false;
  if(k==='proveedores')return (a.ruc&amp;&amp;b.ruc&amp;&amp;a.ruc===b.ruc)||(String(a.nombre||'').toLowerCase()===String(b.nombre||'').toLowerCase());
  if(k==='catalogo')return String(a.descripcion||'').toLowerCase()===String(b.descripcion||'').toLowerCase();
  if(k==='oc')return String(a.numero||'')===String(b.numero||'');
  if(k==='ingresos')return String(a.oc||'')===String(b.oc||'') &amp;&amp; JSON.stringify(a.items||[]).slice(0,120)===JSON.stringify(b.items||[]).slice(0,120);
  if(k==='facturacion')return String(a.oc||'')===String(b.oc||'') &amp;&amp; String(a.producto||'').toLowerCase()===String(b.producto||'').toLowerCase() &amp;&amp; String(a.fechaFactura||'')===String(b.fechaFactura||'');
  return false;
}
async function loadExcelSeed(){
  if(!confirm('Se cargará la base integrada desde el Excel 2026. No duplica OC existentes por número. ¿Continuar?'))return;
  const order=['proveedores','catalogo','oc','ingresos','facturacion'];
  let added=0, skipped=0;
  for(const k of order){
    const arr=EXCEL_SEED[k]||[];
    for(const raw of arr){
      const obj={...raw};
      if((state[k]||[]).some(x=>sameKey(k,x,obj))){skipped++; continue;}
      await saveDoc(k,obj); added++;
    }
  }
  toast('Base Excel cargada: '+added+' nuevos, '+skipped+' omitidos');
}
function openImportPDF(){
  openModal('Importar OC desde PDF',`<div class=&quot;panel&quot;><div class=&quot;pb&quot;><p style=&quot;color:var(--muted);font-size:13px;line-height:1.5;margin-bottom:12px&quot;>Seleccione una Orden de Compra en PDF. El sistema intentará leer N° OC, fecha, proveedor, contacto, productos y totales. Luego podrá editar la OC si algún campo requiere ajuste.</p><div class=&quot;form-grid&quot;><div class=&quot;fg full&quot;><label>Archivo PDF de OC</label><input type=&quot;file&quot; id=&quot;pdf-oc-file&quot; accept=&quot;application/pdf&quot;></div><div class=&quot;fg full&quot;><label>Texto detectado / resultado</label><textarea id=&quot;pdf-preview&quot; rows=&quot;8&quot; placeholder=&quot;Aquí aparecerá el resultado de lectura...&quot; readonly></textarea></div></div></div></div>`,`<button class=&quot;btn&quot; onclick=&quot;PSI.processOCPDF()&quot;>Leer PDF y crear OC</button><button class=&quot;btn ghost&quot; onclick=&quot;PSI.close()&quot;>Cancelar</button>`);
}
function normalizeText(t){return String(t||'').replace(/\s+/g,' ').replace(/\u00a0/g,' ').trim()}
function parseMoney(v){v=String(v||'').replace(/\$/g,'').trim(); if(!v)return 0; if(v.includes(',')&amp;&amp;v.includes('.'))v=v.replace(/\./g,'').replace(',', '.'); else v=v.replace(',', '.'); return Number(v.replace(/[^0-9.\-]/g,''))||0}
function parseDateText(v){v=String(v||'').trim(); let m=v.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/); if(m){return `${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;} return v}
function pickBetween(txt,label,nextLabels){
  const t=normalizeText(txt); const upper=t.toUpperCase(); const pos=upper.indexOf(label.toUpperCase()); if(pos<0)return '';
  let start=pos+label.length, end=t.length;
  for(const n of nextLabels){const p=upper.indexOf(n.toUpperCase(), start); if(p>=0 &amp;&amp; p<end)end=p;}
  return t.slice(start,end).replace(/^[:\s]+/,'').trim();
}
function extractOCFromText(text){
  const t=normalizeText(text);
  const numero=pickBetween(t,'N° ORDEN',['FECHA','ÁREA SOLICITANTE','PROVEEDOR']).replace(':','').trim();
  const fecha=parseDateText(pickBetween(t,'FECHA',['ÁREA SOLICITANTE','PROVEEDOR']).replace(':',''));
  const area=pickBetween(t,'ÁREA SOLICITANTE',['PROVEEDOR','COND. PAGO']);
  const proveedor=pickBetween(t,'PROVEEDOR',['COND. PAGO','RUC']);
  const condPago=pickBetween(t,'COND. PAGO',['RUC','COTIZACIÓN REF']);
  const ruc=pickBetween(t,'RUC',['COTIZACIÓN REF','CONTACTO']);
  const cotizacion=pickBetween(t,'COTIZACIÓN REF.',['CONTACTO','TIEMPO ENTREGA']);
  const contacto=pickBetween(t,'CONTACTO',['TIEMPO ENTREGA','CORREO']);
  const tiempoEntrega=pickBetween(t,'TIEMPO ENTREGA',['CORREO','SOLCITADO','SOLICITADO','ITEMS']);
  const correo=pickBetween(t,'CORREO',['SOLCITADO','SOLICITADO','ITEMS']);
  let solicitadoPor=pickBetween(t,'SOLCITADO POR',['ITEMS','TIPO SERVICIO']);
  if(!solicitadoPor)solicitadoPor=pickBetween(t,'SOLICITADO POR',['ITEMS','TIPO SERVICIO']);
  let subtotal=0, iva=0, total=0;
  let m=t.match(/SUBTOTAL\s*\$?\s*([0-9.,]+)/i); if(m)subtotal=parseMoney(m[1]);
  m=t.match(/IVA\s*15%?\s*\$?\s*([0-9.,]+)/i); if(m)iva=parseMoney(m[1]);
  m=t.match(/TOTAL\s*\$?\s*([0-9.,]+)/i); if(m)total=parseMoney(m[1]);
  const itemRegex=/(\d+)\s+(Reactivos|Insumos|Estandar|Estándar|Equipos|Servicio|Mantenimiento|Calibración|Microbiología)\s+(.+?)\s+(\d+(?:[.,]\d+)?)\s+(Unidad|unidad|Caja|Frasco|mL|ml|L|g|kg|Servicio)\s+(.+?)\s+([A-Za-z0-9\-\/\.]+)\s+\$?\s*([0-9.,]+)\s+\$?\s*([0-9.,]+)/gi;
  const items=[]; let im;
  while((im=itemRegex.exec(t))){items.push({tipo:im[2],descripcion:im[3].trim(),cantidad:parseMoney(im[4])||1,unidad:im[5],nombre:im[6].trim(),catalogo:im[7].trim(),vu:parseMoney(im[8])});}
  if(!items.length){
    let desc=pickBetween(t,'DESCRIPCIÓN DEL PRODUCTO / SERVICIO',['SUBTOTAL','APROBADO POR']);
    desc=desc.replace(/CANT\.\s*UNID\..*/i,'').trim();
    if(desc.length>120)desc=desc.slice(0,120);
    items.push({tipo:'Reactivos',descripcion:desc||'Producto importado desde PDF',cantidad:1,unidad:'Unidad',nombre:'',catalogo:'',vu:subtotal||0});
  }
  const o=calcOC({numero:numero||nextOC(),fecha:fecha||new Date().toISOString().slice(0,10),area:area||'Laboratorio de aguas y suelos',proveedor:proveedor||'',ruc:ruc||'',contacto:contacto||'',correo:correo||'',condPago:condPago||'',cotizacion:cotizacion||'',tiempoEntrega:tiempoEntrega||'',solicitadoPor:solicitadoPor||'Jipson Franco',aprobadoPor:'Ing. Jipson Franco',autorizadoPor:'Ing. Francisco Torres',estado:'Importada PDF',items,requisitos:'ISO 17025 / ISO 17034 / Certificado de análisis o trazabilidad NIST.',docs:'COA, Certificados de calibración, Factura, Guía de remisión.',entrega:'En laboratorio o dirección indicada.',garantia:'Aplicable si corresponde.'});
  if(subtotal)o.subtotal=subtotal; if(iva)o.iva=iva; if(total)o.total=total;
  return o;
}
async function processOCPDF(){
  const file=$('pdf-oc-file')?.files?.[0]; if(!file){toast('Seleccione un PDF'); return;}
  try{
    if(!window.pdfjsLib){toast('No se pudo cargar lector PDF'); return;}
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const buf=await file.arrayBuffer(); const pdf=await pdfjsLib.getDocument({data:new Uint8Array(buf)}).promise;
    let text='';
    for(let p=1;p<=pdf.numPages;p++){const page=await pdf.getPage(p); const tc=await page.getTextContent(); text += '\n'+tc.items.map(i=>i.str).join(' ');}
    const oc=extractOCFromText(text);
    $('pdf-preview').value='OC detectada: '+oc.numero+'\nProveedor: '+oc.proveedor+'\nFecha: '+oc.fecha+'\nItems: '+(oc.items||[]).length+'\nTotal: '+money(oc.total)+'\n\nTexto leído (primeros 1500 caracteres):\n'+text.slice(0,1500);
    if(confirm('Se detectó la OC '+oc.numero+' de '+(oc.proveedor||'proveedor no identificado')+'. ¿Desea guardarla en el ERP?')){
      if(state.oc.some(x=>String(x.numero)===String(oc.numero)) &amp;&amp; !confirm('Ya existe una OC con ese número. ¿Guardar de todos modos?'))return;
      await saveDoc('oc',oc); closeModal(); nav('oc'); toast('OC importada desde PDF');
    }
  }catch(e){console.error(e); toast('No se pudo leer el PDF'); if($('pdf-preview'))$('pdf-preview').value='Error: '+(e.message||e);}
}

 CATEGORÍAS (generadas dinámicamente, sin duplicados) ----\nconst catsEl = document.getElementById('cats');\nCATS.forEach(c => {\n  const btn = document.createElement('button');\n  btn.className = 'cat-btn' + (c === 'Todos' ? ' active' : '');\n  btn.textContent = c === 'Todos' ? 'Todos' : (CAT_ICONS[c] || '') + ' ' + c;\n  btn.onclick = () => {\n    activeCat = c;\n    activeStatus = 'all';\n    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));\n    btn.classList.add('active');\n    renderView();\n  };\n  catsEl.appendChild(btn);\n});\n\n// ---- TABS ----\nfunction showTab(tab) {\n  document.querySelectorAll('.tab-btn').forEach((b, i) =>\n    b.classList.toggle('active', (i===0 &amp;&amp; tab==='view') || (i===1 &amp;&amp; tab==='editor'))\n  );\n  document.getElementById('panel-view').style.display = tab === 'view' ? '' : 'none';\n  document.getElementById('panel-editor').style.display = tab === 'editor' ? 'block' : 'none';\n  if (tab === 'editor') renderEditorList();\n  if (tab === 'view') renderView();\n}\n\n// ---- FECHAS ----\nfunction parseDate(s) {\n  if (!s || s === 'N/A') return null;\n  const parts = s.split('/');\n  if (parts.length !== 3) return null;\n  return new Date(+parts[2], +parts[1] - 1, +parts[0]);\n}\nfunction dateStatus(s) {\n  const d = parseDate(s);\n  if (!d) return 'na';\n  const diff = (d - new Date()) / 86400000;\n  if (diff < 0) return 'expired';\n  if (diff < 90) return 'warning';\n  return 'ok';\n}\n\n\nfunction statusLabel(st) {\n  if (st === 'expired') return 'VENCIDO';\n  if (st === 'warning') return 'POR VENCER';\n  if (st === 'ok') return 'VIGENTE';\n  return 'N/A';\n}\n\nfunction daysUntil(s) {\n  const d = parseDate(s);\n  if (!d) return null;\n  const today = new Date();\n  today.setHours(0,0,0,0);\n  d.setHours(0,0,0,0);\n  return Math.ceil((d - today) / 86400000);\n}\n\nfunction setStatusFilter(status) {\n  activeStatus = status;\n  renderView();\n  const cards = document.getElementById('cards');\n  if (cards) cards.scrollIntoView({ behavior: 'smooth', block: 'start' });\n}\n\nfunction updateExpiryAlert(expiredItems, warningItems, okCount) {\n  const box = document.getElementById('expiry-alert');\n  if (!box) return;\n  const expired = expiredItems.length;\n  const warning = warningItems.length;\n  const near15 = warningItems.filter(d => { const x = daysUntil(d.fecha_exp); return x !== null &amp;&amp; x <= 15; }).length;\n  const near30 = warningItems.filter(d => { const x = daysUntil(d.fecha_exp); return x !== null &amp;&amp; x <= 30; }).length;\n\n  if (expired === 0 &amp;&amp; warning === 0) {\n    box.className = 'expiry-alert success';\n    box.innerHTML = `\n      <div class=\&quot;expiry-alert-inner\&quot;>\n        <div class=\&quot;expiry-alert-icon\&quot;>✅</div>\n        <div>\n          <div class=\&quot;expiry-alert-title\&quot;>CONTROL DE CALIDAD SIN ALERTAS CRÍTICAS</div>\n          <div class=\&quot;expiry-alert-text\&quot;>Todos los estándares registrados están vigentes. Continúe verificando COA, lote y puntos de control antes de su uso.</div>\n        </div>\n      </div>`;\n    return;\n  }\n\n  const priorityItems = [...expiredItems, ...warningItems].slice(0, 8);\n  const rows = priorityItems.map(d => {\n    const dias = daysUntil(d.fecha_exp);\n    const isExp = dias !== null &amp;&amp; dias < 0;\n    const isHot = dias !== null &amp;&amp; dias >= 0 &amp;&amp; dias <= 15;\n    const cls = isExp ? 'danger' : (isHot ? 'hot' : 'warn');\n    const txt = dias === null ? 'Fecha no válida' : (dias < 0 ? `${Math.abs(dias)} día(s) vencido` : `${dias} día(s) restante`);\n    return `<div class=\&quot;qc-alert-row\&quot;>\n      <div class=\&quot;qc-alert-icon\&quot;>${isExp ? '🔴' : (isHot ? '🟠' : '🟡')}</div>\n      <div class=\&quot;qc-alert-main\&quot;>\n        <div class=\&quot;qc-alert-name\&quot;>${d.parametro || 'Estándar'}</div>\n        <div class=\&quot;qc-alert-sub\&quot;>${d.codigo || '—'} · Lote ${d.lote || '—'} · ${d.marca || '—'} · Vence ${d.fecha_exp || '—'}</div>\n      </div>\n      <div class=\&quot;qc-alert-days ${cls}\&quot;>${txt}</div>\n    </div>`;\n  }).join('');\n\n  box.className = expired > 0 ? 'expiry-alert danger' : 'expiry-alert warning';\n  box.innerHTML = `\n    <div class=\&quot;expiry-alert-inner\&quot;>\n      <div class=\&quot;expiry-alert-icon\&quot;>${expired > 0 ? '🚨' : '⚠️'}</div>\n      <div style=\&quot;width:100%\&quot;>\n        <div class=\&quot;expiry-alert-title\&quot;>ALERTA DETALLADA DE CONTROL DE CALIDAD</div>\n        <div class=\&quot;expiry-alert-text\&quot;>\n          Se encontraron <strong>${expired}</strong> vencido(s), <strong>${near15}</strong> por vencer en ≤15 días, <strong>${near30}</strong> por vencer en ≤30 días y <strong>${warning}</strong> dentro del periodo de alerta.\n          Revise vigencia, lote, COA y registre baja/reposición cuando aplique.\n        </div>\n        <div class=\&quot;qc-detail-panel\&quot; style=\&quot;margin:10px 0 0\&quot;>\n          <div class=\&quot;qc-detail-head\&quot;><span>Listado prioritario</span><span>${priorityItems.length} registro(s)</span></div>\n          <div class=\&quot;qc-detail-grid\&quot;>${rows}</div>\n        </div>\n        <div class=\&quot;expiry-alert-actions\&quot;>\n          <button class=\&quot;expiry-alert-btn\&quot; onclick=\&quot;setStatusFilter('expired')\&quot;>🔴 Ver vencidos</button>\n          <button class=\&quot;expiry-alert-btn\&quot; onclick=\&quot;setStatusFilter('warning')\&quot;>🟡 Ver por vencer</button>\n          <button class=\&quot;expiry-alert-btn\&quot; onclick=\&quot;setStatusFilter('all')\&quot;>📋 Ver todos</button>\n        </div>\n      </div>\n    </div>`;\n}\n\nfunction toggleCard(id) {\n  document.getElementById('card-' + id).classList.toggle('expanded');\n}\n\n// ---- VISTA ----\nfunction renderView() {\n  const q = (document.getElementById('search').value || '').toLowerCase();\n  const filtered = DATA.filter(d => {\n    const catOk = activeCat === 'Todos' || d.categoria === activeCat;\n    const statusOk = activeStatus === 'all' || dateStatus(d.fecha_exp) === activeStatus;\n    const qOk = !q || d.parametro.toLowerCase().includes(q)\n      || d.codigo.toLowerCase().includes(q)\n      || (d.marca || '').toLowerCase().includes(q)\n      || (d.lote || '').toLowerCase().includes(q);\n    return catOk &amp;&amp; statusOk &amp;&amp; qOk;\n  });\n\n  let ok = 0, warn = 0, exp = 0;\n  const expiredItems = [];\n  const warningItems = [];\n  DATA.forEach(d => {\n    const s = dateStatus(d.fecha_exp);\n    if (s === 'expired') { exp++; expiredItems.push(d); }\n    else if (s === 'warning') { warn++; warningItems.push(d); }\n    else ok++;\n  });\n  expiredItems.sort((a,b) => (parseDate(a.fecha_exp) || 0) - (parseDate(b.fecha_exp) || 0));\n  warningItems.sort((a,b) => (parseDate(a.fecha_exp) || 0) - (parseDate(b.fecha_exp) || 0));\n  const near15 = warningItems.filter(d => { const x = daysUntil(d.fecha_exp); return x !== null &amp;&amp; x <= 15; }).length;\n  const near30 = warningItems.filter(d => { const x = daysUntil(d.fecha_exp); return x !== null &amp;&amp; x <= 30; }).length;\n  const dash = document.getElementById('qc-dashboard');\n  if (dash) {\n    dash.innerHTML = `\n      <div class=\&quot;qc-kpi blue\&quot;><div class=\&quot;knum\&quot;>${DATA.length}</div><div class=\&quot;klbl\&quot;>Total estándares</div></div>\n      <div class=\&quot;qc-kpi ok\&quot;><div class=\&quot;knum\&quot;>${ok}</div><div class=\&quot;klbl\&quot;>Vigentes</div></div>\n      <div class=\&quot;qc-kpi hot\&quot;><div class=\&quot;knum\&quot;>${near15}</div><div class=\&quot;klbl\&quot;>Vencen ≤15 días</div></div>\n      <div class=\&quot;qc-kpi warn\&quot;><div class=\&quot;knum\&quot;>${near30}</div><div class=\&quot;klbl\&quot;>Vencen ≤30 días</div></div>\n      <div class=\&quot;qc-kpi danger\&quot;><div class=\&quot;knum\&quot;>${exp}</div><div class=\&quot;klbl\&quot;>Vencidos</div></div>`;\n  }\n  document.getElementById('s-ok').textContent = ok;\n  document.getElementById('s-warn').textContent = warn;\n  document.getElementById('s-exp').textContent = exp;\n  document.getElementById('showing').textContent = filtered.length;\n  updateExpiryAlert(expiredItems, warningItems, ok);\n\n  const container = document.getElementById('cards');\n  document.getElementById('empty').style.display = filtered.length === 0 ? '' : 'none';\n  if (filtered.length === 0) { container.innerHTML = ''; return; }\n\n  container.innerHTML = filtered.map(d => {\n    const idx = DATA.indexOf(d);\n    const st = dateStatus(d.fecha_exp);\n    const icon = CAT_ICONS[d.categoria] || '🧪';\n    let dc = '', dl = '';\n    if (st === 'expired') { dc = 'danger'; dl = '⚠️ VENCIDO'; }\n    else if (st === 'warning') { dc = 'warn'; dl = '⏳ Por vencer'; }\n\n    return `<div class=\&quot;card\&quot; id=\&quot;card-${idx}\&quot;>\n      <div class=\&quot;card-head\&quot; onclick=\&quot;toggleCard(${idx})\&quot;>\n        <div class=\&quot;card-avatar\&quot;>${icon}</div>\n        <div class=\&quot;card-main\&quot;>\n          <div class=\&quot;card-param\&quot;>${d.parametro}</div>\n          <div class=\&quot;card-code\&quot;>${d.codigo} · ${d.marca || ''}</div>\n        </div>\n        <div class=\&quot;card-badges\&quot;>\n          <div class=\&quot;badge-rango\&quot;>${d.rango || ''}</div>\n          <div class=\&quot;chevron\&quot;>▾</div>\n        </div>\n      </div>\n      <div class=\&quot;quick-row\&quot;>\n        <span class=\&quot;quick-chip ${dc}\&quot;>📅 ${d.fecha_exp}${dl ? ' · ' + dl : ''}</span>\n        <span class=\&quot;quick-chip ${dc}\&quot;>${daysUntil(d.fecha_exp) === null ? 'Sin fecha' : (daysUntil(d.fecha_exp) < 0 ? Math.abs(daysUntil(d.fecha_exp)) + ' días vencido' : daysUntil(d.fecha_exp) + ' días restantes')}</span>\n      </div>\n      <div class=\&quot;life-line\&quot;><span class=\&quot;${st === 'expired' ? 'danger' : (daysUntil(d.fecha_exp) !== null &amp;&amp; daysUntil(d.fecha_exp) <= 15 ? 'hot' : (st === 'warning' ? 'warn' : 'ok'))}\&quot; style=\&quot;width:${daysUntil(d.fecha_exp) === null ? 0 : Math.max(3, Math.min(100, Math.round((Math.max(daysUntil(d.fecha_exp),0)/365)*100)))}%\&quot;></span></div>\n      <div class=\&quot;card-body\&quot;>\n        <div class=\&quot;info-grid\&quot;>\n          <div class=\&quot;info-cell\&quot;><div class=\&quot;info-label\&quot;>Código</div><div class=\&quot;info-value mono\&quot;>${d.codigo}</div></div>\n          <div class=\&quot;info-cell\&quot;><div class=\&quot;info-label\&quot;>Lote</div><div class=\&quot;info-value mono\&quot;>${d.lote || '—'}</div></div>\n          <div class=\&quot;info-cell full\&quot;><div class=\&quot;info-label\&quot;>Reactivo</div><div class=\&quot;info-value\&quot; style=\&quot;font-size:12px;font-weight:500\&quot;>${d.nombre || '—'}</div></div>\n          <div class=\&quot;info-cell\&quot;><div class=\&quot;info-label\&quot;>Marca</div><div class=\&quot;info-value\&quot;>${d.marca || '—'}</div></div>\n          <div class=\&quot;info-cell\&quot;><div class=\&quot;info-label\&quot;>Vencimiento</div><div class=\&quot;info-value ${dc}\&quot;>${d.fecha_exp}${dl ? ' · ' + dl : ''}</div></div>\n          <div class=\&quot;info-cell\&quot;><div class=\&quot;info-label\&quot;>Días restantes</div><div class=\&quot;info-value ${dc}\&quot;>${daysUntil(d.fecha_exp) === null ? '—' : (daysUntil(d.fecha_exp) < 0 ? Math.abs(daysUntil(d.fecha_exp)) + ' vencido(s)' : daysUntil(d.fecha_exp) + ' día(s)')}</div></div>\n          <div class=\&quot;info-cell\&quot;><div class=\&quot;info-label\&quot;>Estado de uso</div><div class=\&quot;info-value ${dc}\&quot;>${statusLabel(st)}</div></div>\n          <div class=\&quot;info-cell\&quot;><div class=\&quot;info-label\&quot;>Categoría</div><div class=\&quot;info-value\&quot;>${d.categoria || '—'}</div></div>\n          <div class=\&quot;info-cell\&quot;><div class=\&quot;info-label\&quot;>%CVR</div><div class=\&quot;info-value accent\&quot;>${d.cvr ? '≤ ' + d.cvr +
